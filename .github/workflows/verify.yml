name: verify

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0.43
        env:
          MYSQL_ROOT_PASSWORD: cms-verify-root
          MYSQL_DATABASE: cms_verify
          MYSQL_USER: cms_verify
          MYSQL_PASSWORD: cms-verify
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -pcms-verify-root --silent"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 1.26.5
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: make verify
        env:
          CMS_VERIFY_MYSQL_DSN: cms_verify:cms-verify@tcp(127.0.0.1:3306)/cms_verify
          PODMAN: docker
