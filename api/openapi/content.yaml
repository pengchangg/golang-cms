openapi: 3.1.0
info:
  title: Internal CMS Content API
  version: 0.0.0
  description: 内容 API 契约根文档。业务 API 将在对应阶段实现并冻结后通过分片聚合。
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
servers:
  - url: /api/content/v1
security:
  - APIKey: []
paths:
  /models:
    $ref: ./fragments/content/paths.yaml#/~1models
  /models/{model_key}:
    $ref: ./fragments/content/paths.yaml#/~1models~1{model_key}
  /models/{model_key}/entries:
    $ref: ./fragments/content/paths.yaml#/~1models~1{model_key}~1entries
  /models/{model_key}/entries/{entry_id}:
    $ref: ./fragments/content/paths.yaml#/~1models~1{model_key}~1entries~1{entry_id}
  /assets/{asset_id}:
    $ref: ./fragments/content/assets/paths.yaml#/~1assets~1{asset_id}
  /configurations/{namespace_key}:
    $ref: ./fragments/content/configurations/paths.yaml#/~1configurations~1{namespace_key}
  /configurations/{namespace_key}/{item_key}:
    $ref: ./fragments/content/configurations/paths.yaml#/~1configurations~1{namespace_key}~1{item_key}
components:
  securitySchemes:
    APIKey:
      type: http
      scheme: bearer
      bearerFormat: cmsk
  schemas:
    ErrorResponse:
      $ref: ./fragments/shared/error.yaml#/$defs/ErrorResponse
    AssetID:
      $ref: ./fragments/content/assets/schemas.yaml#/$defs/AssetID
    PublishedReferencedAsset:
      $ref: ./fragments/content/assets/schemas.yaml#/$defs/PublishedReferencedAsset
    PublishedReferencedAssets:
      $ref: ./fragments/content/assets/schemas.yaml#/$defs/PublishedReferencedAssets
    SingleMediaValue:
      $ref: ./fragments/content/assets/schemas.yaml#/$defs/SingleMediaValue
    MultiMediaValue:
      $ref: ./fragments/content/assets/schemas.yaml#/$defs/MultiMediaValue
    RichTextImageNode:
      $ref: ./fragments/shared/rich-text.yaml#/$defs/RichTextImageNode
    RichTextAudioNode:
      $ref: ./fragments/shared/rich-text.yaml#/$defs/RichTextAudioNode
    RichTextVideoNode:
      $ref: ./fragments/shared/rich-text.yaml#/$defs/RichTextVideoNode
    RichTextDocument:
      $ref: ./fragments/shared/rich-text.yaml#/$defs/RichTextDocument
