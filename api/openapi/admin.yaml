openapi: 3.1.0
info:
  title: Internal CMS Admin API
  version: 0.0.0
  description: 管理 API 契约根文档。业务 API 将在对应阶段实现并冻结后通过分片聚合。
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
