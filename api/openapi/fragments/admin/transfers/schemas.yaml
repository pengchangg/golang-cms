$schema: https://json-schema.org/draft/2020-12/schema
$id: https://internal-cms.invalid/schemas/admin/transfers/schemas.yaml
x-integration-status: integrated
$defs:
  ImportResult:
    type: object
    additionalProperties: false
    required: [imported]
    properties:
      imported: { type: integer, minimum: 0, maximum: 1000 }
  CSVErrorDetail:
    type: object
    additionalProperties: false
    required: [row, field, code, message]
    properties:
      row: { type: integer, minimum: 1 }
      field: { type: string }
      code: { type: string, minLength: 1 }
      message: { type: string, minLength: 1 }
  CSVErrorResponse:
    type: object
    additionalProperties: false
    required: [error]
    properties:
      error:
        type: object
        additionalProperties: false
        required: [code, message, request_id, details]
        properties:
          code: { type: string, minLength: 1 }
          message: { type: string, minLength: 1 }
          request_id: { type: string, minLength: 1 }
          details:
            type: array
            minItems: 1
            items:
              $ref: "#/$defs/CSVErrorDetail"
