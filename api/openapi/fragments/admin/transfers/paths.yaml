x-integration-status: integrated
/models/{model_id}/transfers/template:
  parameters: &modelId
    - name: model_id
      in: path
      required: true
      schema: { type: string, minLength: 1 }
  get:
    x-integration-status: integrated
    operationId: downloadAdminCSVTemplate
    summary: 下载带 BOM 的模型 CSV 模板
    parameters:
      - &sessionCookie
        name: cms_session
        in: cookie
        required: true
        schema: { type: string, minLength: 1 }
    responses:
      "200":
        description: 仅包含 UTF-8 BOM 和稳定字段 key 表头。
        headers:
          Content-Disposition:
            schema: { type: string, minLength: 1 }
        content:
          text/csv:
            schema: { type: string, contentEncoding: binary }
      "401": &unauthenticated
        description: 管理会话无效。
        content:
          application/json:
            schema:
              $ref: ../../shared/error.yaml#/$defs/ErrorResponse
      "403": &forbidden
        description: 权限不足。
        content:
          application/json:
            schema:
              $ref: ../../shared/error.yaml#/$defs/ErrorResponse
      "404": &notFound
        description: 模型、上传或其他资源不存在。
        content:
          application/json:
            schema:
              $ref: ../../shared/error.yaml#/$defs/ErrorResponse
/models/{model_id}/imports/uploads:
  parameters: *modelId
  post:
    x-integration-status: integrated
    operationId: createAdminImportUpload
    summary: 创建 CSV 导入源文件签名上传
    parameters: &writeHeaders
      - *sessionCookie
      - name: Origin
        in: header
        required: true
        schema: { type: string, format: uri }
      - name: X-CSRF-Token
        in: header
        required: true
        schema: { type: string, minLength: 32 }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ./schemas.yaml#/$defs/CreateImportUploadRequest
    responses:
      "201":
        description: 已创建任务源文件上传并签发短时 PUT 请求。
        headers:
          Cache-Control:
            schema: { const: no-store }
        content:
          application/json:
            schema:
              $ref: ./schemas.yaml#/$defs/ImportUpload
      "400": &badRequest
        description: 请求或查询校验失败。
        content:
          application/json:
            schema:
              $ref: ../../shared/error.yaml#/$defs/ErrorResponse
      "401": *unauthenticated
      "403": *forbidden
      "404": *notFound
      "413":
        description: 文件超过允许大小，error.code 为 file_too_large。
        content:
          application/json:
            schema:
              $ref: ../../shared/error.yaml#/$defs/ErrorResponse
      "503": &storeUnavailable
        description: 对象存储临时不可用，error.code 为 object_store_unavailable。
        content:
          application/json:
            schema:
              $ref: ../../shared/error.yaml#/$defs/ErrorResponse
/models/{model_id}/imports:
  parameters: *modelId
  post:
    x-integration-status: integrated
    operationId: createAdminCSVImport
    summary: 确认源文件并创建 CSV 导入任务
    parameters:
      - *sessionCookie
      - name: Origin
        in: header
        required: true
        schema: { type: string, format: uri }
      - name: X-CSRF-Token
        in: header
        required: true
        schema: { type: string, minLength: 32 }
      - &idempotencyKey
        name: Idempotency-Key
        in: header
        required: true
        schema: { type: string, minLength: 16, maxLength: 128, pattern: "^[!-~]+$" }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ./schemas.yaml#/$defs/CreateImportRequest
    responses:
      "201": &jobCreated
        description: 新任务已持久化并排队。
        content:
          application/json:
            schema:
              $ref: ../jobs/schemas.yaml#/$defs/Job
      "200": &jobReplayed
        description: 幂等重放，返回原任务。
        content:
          application/json:
            schema:
              $ref: ../jobs/schemas.yaml#/$defs/Job
      "400": *badRequest
      "401": *unauthenticated
      "403": *forbidden
      "404": *notFound
      "409": &conflict
        description: 上传状态或幂等键冲突。
        content:
          application/json:
            schema:
              $ref: ../../shared/error.yaml#/$defs/ErrorResponse
      "503": *storeUnavailable
/models/{model_id}/exports:
  parameters: *modelId
  post:
    x-integration-status: integrated
    operationId: createAdminCSVExport
    summary: 按不可变查询快照创建 CSV 导出任务
    parameters:
      - *sessionCookie
      - name: Origin
        in: header
        required: true
        schema: { type: string, format: uri }
      - name: X-CSRF-Token
        in: header
        required: true
        schema: { type: string, minLength: 32 }
      - *idempotencyKey
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ./schemas.yaml#/$defs/CreateExportRequest
    responses:
      "201": *jobCreated
      "200": *jobReplayed
      "400": *badRequest
      "401": *unauthenticated
      "403": *forbidden
      "404": *notFound
      "409": *conflict
