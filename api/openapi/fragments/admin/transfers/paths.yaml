x-integration-status: integrated
/models/{model_id}/transfers/template:
  parameters: &modelId
    - name: model_id
      in: path
      required: true
      schema: { type: string, minLength: 1 }
  get:
    x-integration-status: integrated
    operationId: downloadAdminCSVTemplate
    summary: 下载带 BOM 的模型 CSV 模板
    parameters:
      - &sessionCookie
        name: cms_session
        in: cookie
        required: true
        schema: { type: string, minLength: 1 }
    responses:
      "200":
        description: 仅包含 UTF-8 BOM 和稳定字段 key 表头。
        headers:
          Content-Disposition:
            schema: { type: string, minLength: 1 }
        content:
          text/csv:
            schema: { type: string, contentEncoding: binary }
      "401": &unauthenticated
        description: 管理会话无效。
        content:
          application/json:
            schema:
              $ref: ../../shared/error.yaml#/$defs/ErrorResponse
      "403": &forbidden
        description: 权限不足。
        content:
          application/json:
            schema:
              $ref: ../../shared/error.yaml#/$defs/ErrorResponse
      "404": &notFound
        description: 模型不存在。
        content:
          application/json:
            schema:
              $ref: ../../shared/error.yaml#/$defs/ErrorResponse
/models/{model_id}/imports:
  parameters: *modelId
  post:
    x-integration-status: integrated
    operationId: importAdminCSV
    summary: 同步导入 CSV 草稿
    parameters: &writeHeaders
      - *sessionCookie
      - name: Origin
        in: header
        required: true
        schema: { type: string, format: uri }
      - name: X-CSRF-Token
        in: header
        required: true
        schema: { type: string, minLength: 32 }
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            additionalProperties: false
            required: [file]
            properties:
              file:
                type: string
                contentEncoding: binary
    responses:
      "200":
        description: 全部草稿已在同一事务中导入。
        content:
          application/json:
            schema:
              $ref: ./schemas.yaml#/$defs/ImportResult
      "400": &badRequest
        description: multipart、CSV 或内容校验失败；CSV details 包含 row、field、code、message，行超限时 code 为 row_limit_exceeded。
        content:
          application/json:
            schema:
              oneOf:
                - $ref: ./schemas.yaml#/$defs/CSVErrorResponse
                - $ref: ../../shared/error.yaml#/$defs/ErrorResponse
      "401": *unauthenticated
      "403": *forbidden
      "404": *notFound
      "413":
        description: 请求超过 10 MiB，error.code 为 file_too_large。
        content:
          application/json:
            schema:
              $ref: ../../shared/error.yaml#/$defs/ErrorResponse
/models/{model_id}/exports.csv:
  parameters: *modelId
  get:
    x-integration-status: integrated
    operationId: exportAdminCSV
    summary: 同步导出当前草稿 CSV
    parameters:
      - *sessionCookie
      - name: workflow_status
        in: query
        schema:
          $ref: ../content/workflow-schemas.yaml#/$defs/WorkflowStatus
      - name: filter
        in: query
        schema: { type: string }
      - name: relation_filter
        in: query
        schema: { type: string }
      - name: sort
        in: query
        schema: { type: string }
    responses:
      "200":
        description: 当前草稿内容的 UTF-8 BOM CSV。
        headers:
          Content-Disposition:
            schema: { type: string, minLength: 1 }
        content:
          text/csv:
            schema: { type: string, contentEncoding: binary }
      "400": *badRequest
      "401": *unauthenticated
      "403": *forbidden
      "404": *notFound
