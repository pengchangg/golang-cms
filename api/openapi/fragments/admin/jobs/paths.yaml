x-integration-status: integrated
/jobs:
  get:
    x-integration-status: integrated
    operationId: listAdminJobs
    summary: 列出当前用户可见的后台任务
    parameters:
      - &sessionCookie
        name: cms_session
        in: cookie
        required: true
        schema: { type: string, minLength: 1 }
      - name: type
        in: query
        schema:
          $ref: ./schemas.yaml#/$defs/JobType
      - name: status
        in: query
        schema:
          $ref: ./schemas.yaml#/$defs/JobStatus
      - name: model_id
        in: query
        schema: { type: string, minLength: 1 }
      - &limit
        name: limit
        in: query
        schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      - &cursor
        name: cursor
        in: query
        schema: { type: string, minLength: 1 }
    responses:
      "200":
        description: 按 created_at DESC、id DESC 返回任务。
        content:
          application/json:
            schema:
              $ref: ./schemas.yaml#/$defs/JobListResponse
      "400": &badRequest
        description: 查询、游标或请求校验失败。
        content:
          application/json:
            schema:
              $ref: ../../shared/error.yaml#/$defs/ErrorResponse
      "401": &unauthenticated
        description: 管理会话无效。
        content:
          application/json:
            schema:
              $ref: ../../shared/error.yaml#/$defs/ErrorResponse
      "403": &forbidden
        description: 权限不足。
        content:
          application/json:
            schema:
              $ref: ../../shared/error.yaml#/$defs/ErrorResponse
/jobs/{job_id}:
  parameters: &jobId
    - name: job_id
      in: path
      required: true
      schema: { type: string, minLength: 1 }
  get:
    x-integration-status: integrated
    operationId: getAdminJob
    summary: 获取后台任务状态
    parameters: [*sessionCookie]
    responses:
      "200": &jobResponse
        description: 任务状态和非敏感错误摘要。
        content:
          application/json:
            schema:
              $ref: ./schemas.yaml#/$defs/Job
      "401": *unauthenticated
      "403": *forbidden
      "404": &notFound
        description: 任务或任务文件不存在，或不属于当前可见范围。
        content:
          application/json:
            schema:
              $ref: ../../shared/error.yaml#/$defs/ErrorResponse
/jobs/{job_id}/cancel:
  parameters: *jobId
  post:
    x-integration-status: integrated
    operationId: cancelAdminJob
    summary: 取消排队任务或请求运行任务安全取消
    parameters: &writeHeaders
      - *sessionCookie
      - name: Origin
        in: header
        required: true
        schema: { type: string, format: uri }
      - name: X-CSRF-Token
        in: header
        required: true
        schema: { type: string, minLength: 32 }
    responses:
      "200": *jobResponse
      "401": *unauthenticated
      "403": *forbidden
      "404": *notFound
      "409": &jobConflict
        description: 任务状态或剩余次数不允许该动作。
        content:
          application/json:
            schema:
              $ref: ../../shared/error.yaml#/$defs/ErrorResponse
/jobs/{job_id}/retry:
  parameters: *jobId
  post:
    x-integration-status: integrated
    operationId: retryAdminJob
    summary: 将可重试的失败任务重新排队
    parameters: *writeHeaders
    responses:
      "200": *jobResponse
      "401": *unauthenticated
      "403": *forbidden
      "404": *notFound
      "409": *jobConflict
/jobs/{job_id}/errors:
  parameters: *jobId
  get:
    x-integration-status: integrated
    operationId: listAdminJobErrors
    summary: 分页读取 CSV 导入行级错误
    parameters: [*sessionCookie, *limit, *cursor]
    responses:
      "200":
        description: 按 row ASC、field ASC、code ASC 返回错误。
        content:
          application/json:
            schema:
              $ref: ./schemas.yaml#/$defs/TransferErrorListResponse
      "400": *badRequest
      "401": *unauthenticated
      "403": *forbidden
      "404": *notFound
/jobs/{job_id}/files/{file_kind}:
  parameters:
    - name: job_id
      in: path
      required: true
      schema: { type: string, minLength: 1 }
    - name: file_kind
      in: path
      required: true
      schema: { type: string, enum: [errors, result] }
  get:
    x-integration-status: integrated
    operationId: downloadAdminJobFile
    summary: 下载未过期的错误报告或导出结果
    parameters: [*sessionCookie]
    responses:
      "302":
        description: 重定向到短时私有对象存储下载地址。
        headers:
          Location:
            required: true
            schema: { type: string, format: uri }
          Cache-Control:
            required: true
            schema: { const: "private, no-store" }
      "401": *unauthenticated
      "403": *forbidden
      "404": *notFound
      "410":
        description: 文件已过期，error.code 为 job_file_expired。
        content:
          application/json:
            schema:
              $ref: ../../shared/error.yaml#/$defs/ErrorResponse
      "503":
        description: 对象存储临时不可用，error.code 为 object_store_unavailable。
        content:
          application/json:
            schema:
              $ref: ../../shared/error.yaml#/$defs/ErrorResponse
