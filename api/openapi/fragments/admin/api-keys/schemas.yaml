$schema: https://json-schema.org/draft/2020-12/schema
$id: https://internal-cms.invalid/schemas/admin/api-keys/schemas.yaml
x-integration-status: integrated
$defs:
  APIKeyStatus:
    type: string
    enum: [active, expired, revoked]
  APIKey:
    type: object
    additionalProperties: false
    required:
      [id, name, prefix, model_ids, status, expires_at, revoked_at, last_used_at, rotated_from_id, replaced_by_id, created_by, created_at]
    properties:
      id: { type: string, minLength: 1 }
      name: { type: string, minLength: 1, maxLength: 120 }
      prefix: { type: string, pattern: "^[a-z2-7]{12}$" }
      model_ids:
        type: array
        minItems: 1
        uniqueItems: true
        items: { type: string, minLength: 1 }
      status:
        $ref: "#/$defs/APIKeyStatus"
      expires_at: { type: [string, "null"], format: date-time }
      revoked_at: { type: [string, "null"], format: date-time }
      last_used_at: { type: [string, "null"], format: date-time }
      rotated_from_id: { type: [string, "null"], minLength: 1 }
      replaced_by_id: { type: [string, "null"], minLength: 1 }
      created_by: { type: string, minLength: 1 }
      created_at: { type: string, format: date-time }
  APIKeySecret:
    type: object
    additionalProperties: false
    required:
      [id, name, prefix, model_ids, status, expires_at, revoked_at, last_used_at, rotated_from_id, replaced_by_id, created_by, created_at, key]
    properties:
      id: { type: string, minLength: 1 }
      name: { type: string, minLength: 1, maxLength: 120 }
      prefix: { type: string, pattern: "^[a-z2-7]{12}$" }
      model_ids:
        type: array
        minItems: 1
        uniqueItems: true
        items: { type: string, minLength: 1 }
      status:
        $ref: "#/$defs/APIKeyStatus"
      expires_at: { type: [string, "null"], format: date-time }
      revoked_at: { type: [string, "null"], format: date-time }
      last_used_at: { type: [string, "null"], format: date-time }
      rotated_from_id: { type: [string, "null"], minLength: 1 }
      replaced_by_id: { type: [string, "null"], minLength: 1 }
      created_by: { type: string, minLength: 1 }
      created_at: { type: string, format: date-time }
      key:
        type: string
        pattern: "^cmsk_[a-z2-7]{12}_[A-Za-z0-9_-]{43}$"
        description: 完整密钥仅在创建或轮换成功响应中出现一次。
  CreateAPIKeyRequest:
    type: object
    additionalProperties: false
    required: [name, model_ids, expires_at]
    properties:
      name: { type: string, minLength: 1, maxLength: 120 }
      model_ids:
        type: array
        minItems: 1
        uniqueItems: true
        items: { type: string, minLength: 1 }
      expires_at: { type: [string, "null"], format: date-time }
  RotateAPIKeyRequest:
    type: object
    additionalProperties: false
    properties:
      name: { type: string, minLength: 1, maxLength: 120 }
      model_ids:
        type: array
        minItems: 1
        uniqueItems: true
        items: { type: string, minLength: 1 }
      expires_at: { type: [string, "null"], format: date-time }
  APIKeyListResponse:
    type: object
    additionalProperties: false
    required: [items, next_cursor]
    properties:
      items:
        type: array
        items:
          $ref: "#/$defs/APIKey"
      next_cursor: { type: [string, "null"], minLength: 1 }
