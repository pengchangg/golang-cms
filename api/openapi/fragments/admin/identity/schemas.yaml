$schema: https://json-schema.org/draft/2020-12/schema
$id: https://internal-cms.invalid/schemas/admin/identity/schemas.yaml
$defs:
  AuthMethod:
    type: string
    enum: [sms, local]
  PhoneInput:
    type: string
    pattern: "^(?:\\+86)?1[3-9][0-9]{9}$"
  Phone:
    type: string
    pattern: "^\\+861[3-9][0-9]{9}$"
  PhoneMasked:
    type: string
    pattern: "^1[3-9][0-9]\\*{4}[0-9]{4}$"
  SystemPermissionCode:
    type: string
    enum:
      - users.view
      - users.manage
      - roles.view
      - roles.manage
      - models.view
      - models.create
      - models.update
      - models.archive
      - assets.view
      - assets.upload
      - assets.update
      - assets.archive
      - api_keys.view
      - api_keys.create
      - api_keys.revoke
      - audit.view
  ModelPermissionCode:
    type: string
    enum:
      - content.view
      - content.create
      - content.update
      - content.archive
      - content.submit
      - content.review
      - content.publish
      - content.unpublish
  ModelPermissionGrant:
    type: object
    additionalProperties: false
    required: [model_id, permissions]
    properties:
      model_id:
        type: string
        minLength: 1
      permissions:
        type: array
        uniqueItems: true
        items:
          $ref: "#/$defs/ModelPermissionCode"
  Principal:
    type: object
    additionalProperties: false
    required:
      - user_id
      - display_name
      - email
      - auth_method
      - system_permissions
      - model_permissions
    properties:
      user_id:
        type: string
        minLength: 1
      display_name:
        type: string
        minLength: 1
        maxLength: 120
      email:
        type: [string, "null"]
        format: email
      auth_method:
        $ref: "#/$defs/AuthMethod"
      system_permissions:
        type: array
        uniqueItems: true
        items:
          $ref: "#/$defs/SystemPermissionCode"
      model_permissions:
        type: array
        items:
          $ref: "#/$defs/ModelPermissionGrant"
  ValidationDetail:
    type: object
    additionalProperties: false
    required: [path, code, message]
    properties:
      path:
        type: string
        description: 相对于请求 JSON 根的 RFC 6901 JSON Pointer；整体错误为空字符串。
      code:
        type: string
        pattern: "^[a-z][a-z0-9_]*$"
      message:
        type: string
        minLength: 1
  ValidationErrorResponse:
    type: object
    additionalProperties: false
    required: [error]
    properties:
      error:
        type: object
        additionalProperties: false
        required: [code, message, request_id, details]
        properties:
          code:
            const: validation_failed
          message: { type: string, minLength: 1 }
          request_id: { type: string, minLength: 1 }
          details:
            type: array
            minItems: 1
            items:
              $ref: "#/$defs/ValidationDetail"
  UserStatus:
    type: string
    enum: [enabled, disabled]
  UserSummary:
    type: object
    additionalProperties: false
    required: [id, display_name, email, phone_masked, auth_methods, is_emergency_admin, status, created_at, updated_at]
    properties:
      id: { type: string, minLength: 1 }
      display_name: { type: string, minLength: 1, maxLength: 120 }
      email: { type: [string, "null"], format: email }
      phone_masked:
        oneOf:
          - $ref: "#/$defs/PhoneMasked"
          - type: "null"
      auth_methods:
        type: array
        minItems: 1
        uniqueItems: true
        items:
          $ref: "#/$defs/AuthMethod"
      is_emergency_admin: { type: boolean }
      status:
        $ref: "#/$defs/UserStatus"
      created_at: { type: string, format: date-time }
      updated_at: { type: string, format: date-time }
  User:
    type: object
    additionalProperties: false
    required: [id, display_name, email, phone_masked, phone, auth_methods, is_emergency_admin, status, role_ids, created_at, updated_at]
    properties:
      id: { type: string, minLength: 1 }
      display_name: { type: string, minLength: 1, maxLength: 120 }
      email: { type: [string, "null"], format: email }
      phone_masked:
        oneOf:
          - $ref: "#/$defs/PhoneMasked"
          - type: "null"
      phone:
        oneOf:
          - $ref: "#/$defs/Phone"
          - type: "null"
      auth_methods:
        type: array
        minItems: 1
        uniqueItems: true
        items:
          $ref: "#/$defs/AuthMethod"
      is_emergency_admin: { type: boolean }
      status:
        $ref: "#/$defs/UserStatus"
      role_ids:
        type: array
        uniqueItems: true
        items: { type: string, minLength: 1 }
      created_at: { type: string, format: date-time }
      updated_at: { type: string, format: date-time }
  SetUserStatusRequest:
    type: object
    additionalProperties: false
    required: [status]
    properties:
      status:
        $ref: "#/$defs/UserStatus"
  CreateUserRequest:
    type: object
    additionalProperties: false
    required: [display_name, phone, role_ids]
    properties:
      display_name: { type: string, minLength: 1, maxLength: 120 }
      phone:
        $ref: "#/$defs/PhoneInput"
      role_ids:
        type: array
        uniqueItems: true
        items: { type: string, minLength: 1 }
  UpdateUserPhoneRequest:
    type: object
    additionalProperties: false
    required: [phone]
    properties:
      phone:
        $ref: "#/$defs/PhoneInput"
  UserListResponse:
    type: object
    additionalProperties: false
    required: [items, next_cursor]
    properties:
      items:
        type: array
        items:
          $ref: "#/$defs/UserSummary"
      next_cursor: { type: [string, "null"], minLength: 1 }
