$schema: https://json-schema.org/draft/2020-12/schema
$id: https://internal-cms.invalid/schemas/admin/models/schemas.yaml
$defs:
  ResourceStatus:
    type: string
    enum: [active, archived]
  ModelKey:
    type: string
    pattern: "^[a-z][a-z0-9_]{0,63}$"
  FieldType:
    type: string
    enum:
      - single_line_text
      - multi_line_text
      - rich_text
      - integer
      - decimal
      - boolean
      - date
      - datetime
      - single_select
      - multi_select
      - json
      - single_media
      - multi_media
      - single_relation
      - multi_relation
      - object
      - repeatable_group
  EnumOption:
    type: object
    additionalProperties: false
    required: [value, label]
    properties:
      value:
        type: string
        minLength: 1
        maxLength: 120
      label:
        type: string
        minLength: 1
        maxLength: 120
  FieldConstraints:
    type: object
    additionalProperties: false
    properties:
      min_length:
        type: integer
        minimum: 0
      max_length:
        type: integer
        minimum: 0
      minimum:
        type: string
        pattern: '^-?(0|[1-9][0-9]*)(\.[0-9]+)?$'
        description: 整数或十进制边界的无指数规范字符串。
      maximum:
        type: string
        pattern: '^-?(0|[1-9][0-9]*)(\.[0-9]+)?$'
      enum_options:
        type: array
        minItems: 1
        items:
          $ref: "#/$defs/EnumOption"
      target_model_id:
        type: string
        minLength: 1
        description: 关联目标活动模型 ID，不能等于字段所属模型 ID。
      unique:
        type: boolean
        default: false
      filterable:
        type: boolean
        default: false
      sortable:
        type: boolean
        default: false
  ContentFieldInput:
    type: object
    additionalProperties: false
    required: [key, display_name, type]
    properties:
      key:
        $ref: "#/$defs/ModelKey"
      display_name:
        type: string
        minLength: 1
        maxLength: 120
      description:
        type: string
        maxLength: 1000
        default: ""
      type:
        $ref: "#/$defs/FieldType"
      required:
        type: boolean
        default: false
      default_value:
        description: 必须符合字段类型；null 表示无默认值。
      constraints:
        $ref: "#/$defs/FieldConstraints"
      children:
        type: array
        default: []
        items:
          $ref: "#/$defs/ContentFieldInput"
        description: 仅 object 和 repeatable_group 可用；服务端强制最大深度 2。
  ContentFieldPatch:
    type: object
    additionalProperties: false
    minProperties: 1
    dependentRequired:
      type: [default_value, constraints, children]
    properties:
      display_name:
        type: string
        minLength: 1
        maxLength: 120
      description:
        type: string
        maxLength: 1000
      type:
        $ref: "#/$defs/FieldType"
      required:
        type: boolean
      default_value: {}
      constraints:
        $ref: "#/$defs/FieldConstraints"
      children:
        type: array
        items:
          $ref: "#/$defs/ContentFieldInput"
  ContentField:
    type: object
    additionalProperties: false
    required:
      - id
      - key
      - display_name
      - description
      - type
      - required
      - default_value
      - constraints
      - children
      - status
      - created_at
      - updated_at
    properties:
      id: { type: string, minLength: 1 }
      key:
        $ref: "#/$defs/ModelKey"
      display_name: { type: string, minLength: 1, maxLength: 120 }
      description: { type: string, maxLength: 1000 }
      type:
        $ref: "#/$defs/FieldType"
      required: { type: boolean }
      default_value:
        description: 符合字段类型的默认值；null 表示无默认值。
      constraints:
        $ref: "#/$defs/FieldConstraints"
      children:
        type: array
        items:
          $ref: "#/$defs/ContentField"
      status:
        $ref: "#/$defs/ResourceStatus"
      created_at: { type: string, format: date-time }
      updated_at: { type: string, format: date-time }
  CreateContentModelRequest:
    type: object
    additionalProperties: false
    required: [key, display_name]
    properties:
      key:
        $ref: "#/$defs/ModelKey"
      display_name:
        type: string
        minLength: 1
        maxLength: 120
      description:
        type: string
        maxLength: 1000
        default: ""
  UpdateContentModelRequest:
    type: object
    additionalProperties: false
    minProperties: 1
    properties:
      display_name:
        type: string
        minLength: 1
        maxLength: 120
      description:
        type: string
        maxLength: 1000
  ContentModelSummary:
    type: object
    additionalProperties: false
    required:
      [id, key, display_name, description, status, created_at, updated_at]
    properties:
      id: { type: string, minLength: 1 }
      key:
        $ref: "#/$defs/ModelKey"
      display_name: { type: string, minLength: 1, maxLength: 120 }
      description: { type: string, maxLength: 1000 }
      status:
        $ref: "#/$defs/ResourceStatus"
      created_at: { type: string, format: date-time }
      updated_at: { type: string, format: date-time }
  ContentModel:
    type: object
    additionalProperties: false
    required:
      [
        id,
        key,
        display_name,
        description,
        status,
        created_at,
        updated_at,
        fields,
      ]
    properties:
      id: { type: string, minLength: 1 }
      key:
        $ref: "#/$defs/ModelKey"
      display_name: { type: string, minLength: 1, maxLength: 120 }
      description: { type: string, maxLength: 1000 }
      status:
        $ref: "#/$defs/ResourceStatus"
      created_at: { type: string, format: date-time }
      updated_at: { type: string, format: date-time }
      fields:
        type: array
        items:
          $ref: "#/$defs/ContentField"
  ContentModelListResponse:
    type: object
    additionalProperties: false
    required: [items]
    properties:
      items:
        type: array
        items:
          $ref: "#/$defs/ContentModelSummary"
  ContentFieldListResponse:
    type: object
    additionalProperties: false
    required: [items]
    properties:
      items:
        type: array
        items:
          $ref: "#/$defs/ContentField"
