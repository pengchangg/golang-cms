x-integration-status: integrated
x-admin-configuration-errors:
  bad-request: &badRequest
    description: 查询、游标或请求体校验失败，error.code 为 invalid_query、invalid_cursor 或 validation_failed。
    content:
      application/json:
        schema:
          oneOf:
            - $ref: ../identity/schemas.yaml#/$defs/ValidationErrorResponse
            - $ref: ../../shared/error.yaml#/$defs/ErrorResponse
  unauthenticated: &unauthenticated
    description: 管理会话无效。
    content:
      application/json:
        schema:
          $ref: ../../shared/error.yaml#/$defs/ErrorResponse
  forbidden: &forbidden
    description: 缺少系统配置权限或目标配置命名空间权限。
    content:
      application/json:
        schema:
          $ref: ../../shared/error.yaml#/$defs/ErrorResponse
  not-found: &notFound
    description: 配置命名空间、配置项或 Revision 不存在，error.code 为 resource_not_found。
    content:
      application/json:
        schema:
          $ref: ../../shared/error.yaml#/$defs/ErrorResponse
  conflict: &conflict
    description: key、归档状态、草稿指针、发布指针或工作流状态冲突。
    content:
      application/json:
        schema:
          $ref: ../../shared/error.yaml#/$defs/ErrorResponse
  too-large: &tooLarge
    description: JSON 请求体超过 128 KiB，error.code 为 request_body_too_large。
    content:
      application/json:
        schema:
          $ref: ../../shared/error.yaml#/$defs/ErrorResponse
/configurations:
  get:
    x-integration-status: integrated
    operationId: listAdminConfigurationNamespaces
    summary: 列出配置命名空间
    parameters:
      - &sessionCookie
        name: cms_session
        in: cookie
        required: true
        schema: { type: string, minLength: 1 }
      - &status
        name: status
        in: query
        schema:
          $ref: ./schemas.yaml#/$defs/ConfigurationResourceStatus
    responses:
      "200":
        description: 配置命名空间列表。
        content:
          application/json:
            schema:
              $ref: ./schemas.yaml#/$defs/ConfigurationNamespaceListResponse
      "400": *badRequest
      "401": *unauthenticated
      "403": *forbidden
  post:
    x-integration-status: integrated
    operationId: createAdminConfigurationNamespace
    summary: 创建配置命名空间
    parameters: &writeHeaders
      - *sessionCookie
      - name: Origin
        in: header
        required: true
        schema: { type: string, format: uri }
      - name: X-CSRF-Token
        in: header
        required: true
        schema: { type: string, minLength: 32 }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ./schemas.yaml#/$defs/CreateConfigurationNamespaceRequest
    responses:
      "201":
        description: 配置命名空间已创建。
        content:
          application/json:
            schema:
              $ref: ./schemas.yaml#/$defs/ConfigurationNamespace
      "400": *badRequest
      "401": *unauthenticated
      "403": *forbidden
      "409": *conflict
      "413": *tooLarge
/configurations/{namespace_id}:
  parameters: &namespaceId
    - name: namespace_id
      in: path
      required: true
      schema: { type: string, pattern: "^cns_[a-f0-9]{32}$" }
  get:
    x-integration-status: integrated
    operationId: getAdminConfigurationNamespace
    summary: 获取配置命名空间
    parameters: [*sessionCookie]
    responses:
      "200":
        description: 配置命名空间详情。
        content:
          application/json:
            schema:
              $ref: ./schemas.yaml#/$defs/ConfigurationNamespace
      "401": *unauthenticated
      "403": *forbidden
      "404": *notFound
  patch:
    x-integration-status: integrated
    operationId: updateAdminConfigurationNamespace
    summary: 修改配置命名空间显示信息
    parameters: *writeHeaders
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ./schemas.yaml#/$defs/UpdateConfigurationNamespaceRequest
    responses:
      "200":
        description: 配置命名空间已更新。
        content:
          application/json:
            schema:
              $ref: ./schemas.yaml#/$defs/ConfigurationNamespace
      "400": *badRequest
      "401": *unauthenticated
      "403": *forbidden
      "404": *notFound
      "409": *conflict
      "413": *tooLarge
  delete:
    x-integration-status: integrated
    operationId: archiveAdminConfigurationNamespace
    summary: 归档空配置命名空间
    parameters: *writeHeaders
    responses:
      "204": { description: 配置命名空间已归档。 }
      "401": *unauthenticated
      "403": *forbidden
      "404": *notFound
      "409": *conflict
/configurations/{namespace_id}/items:
  parameters: *namespaceId
  get:
    x-integration-status: integrated
    operationId: listAdminConfigurationItems
    summary: 列出配置项定义
    parameters: [*sessionCookie, *status]
    responses:
      "200":
        description: 配置项定义列表。
