/auth/oidc/start:
  get:
    operationId: startAdminOIDCLogin
    summary: 发起 OIDC Authorization Code + PKCE 登录
    security: []
    parameters:
      - name: return_to
        in: query
        required: false
        schema:
          type: string
          pattern: '^/(?!/)(?!.*\\).*$'
        description: 登录后返回的同源绝对路径；不得包含 scheme 或 host。
    responses:
      "302":
        description: 重定向至企业 OIDC 身份源。
        headers:
          Location:
            required: true
            schema:
              type: string
              format: uri
      "400":
        description: return_to 不合法。
        content:
          application/json:
            schema:
              $ref: ../../shared/error.yaml#/$defs/ErrorResponse
      "503":
        description: OIDC 身份源暂时不可用。
        content:
          application/json:
            schema:
              $ref: ../../shared/error.yaml#/$defs/ErrorResponse
/auth/oidc/callback:
  get:
    operationId: completeAdminOIDCLogin
    summary: 完成 OIDC 回调并建立管理会话
    security: []
    parameters:
      - name: code
        in: query
        required: false
        schema: { type: string, minLength: 1 }
      - name: state
        in: query
        required: true
        schema: { type: string, minLength: 1 }
      - name: error
        in: query
        required: false
        schema: { type: string, minLength: 1 }
      - name: error_description
        in: query
        required: false
        schema: { type: string }
    responses:
      "303":
        description: 登录成功，设置 cms_session 并重定向至同源管理页。
        headers:
          Location:
            required: true
            schema: { type: string }
          Set-Cookie:
            required: true
            schema: { type: string }
            description: cms_session；HttpOnly、Secure、SameSite=Lax、Path=/api/admin/v1，无 Domain。
      "400":
        description: 回调参数、state 或 OIDC 声明不合法。
        content:
          application/json:
            schema:
              $ref: ../../shared/error.yaml#/$defs/ErrorResponse
      "401":
        description: 用户不可登录或身份验证失败。
        content:
          application/json:
            schema:
              $ref: ../../shared/error.yaml#/$defs/ErrorResponse
      "503":
        description: OIDC 身份源暂时不可用。
        content:
          application/json:
            schema:
              $ref: ../../shared/error.yaml#/$defs/ErrorResponse
/auth/local/login:
  post:
    operationId: loginAdminLocally
    summary: 本地应急管理员登录
    security: []
    description: 必须通过同源 Origin 校验；建立会话前不要求 CSRF Token。
    parameters:
      - name: Origin
        in: header
        required: true
        schema: { type: string, format: uri }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ./schemas.yaml#/$defs/LocalLoginRequest
    responses:
      "200":
        description: 登录成功并建立会话。
        headers:
          Set-Cookie:
            required: true
            schema: { type: string }
            description: cms_session；HttpOnly、Secure、SameSite=Lax、Path=/api/admin/v1，无 Domain。
        content:
          application/json:
            schema:
              $ref: ./schemas.yaml#/$defs/SessionResponse
      "400":
        description: 请求体格式或字段校验失败。
        content:
          application/json:
            schema:
              $ref: ../identity/schemas.yaml#/$defs/ValidationErrorResponse
      "401":
        description: 用户名或密码无效，错误码固定为 invalid_credentials。
        content:
          application/json:
            schema:
              $ref: ../../shared/error.yaml#/$defs/ErrorResponse
      "403":
        description: Origin 缺失、不匹配或应急网页登录已关闭。
        content:
          application/json:
            schema:
              $ref: ../../shared/error.yaml#/$defs/ErrorResponse
/auth/session:
  get:
    operationId: getAdminSession
    summary: 获取当前管理会话
    parameters:
      - &sessionCookie
        name: cms_session
        in: cookie
        required: true
        schema: { type: string, minLength: 1 }
        description: HttpOnly 管理会话 Cookie；前端不得读取或自行构造。
    responses:
      "200":
        description: 当前会话、Principal 和 CSRF Token。
        content:
          application/json:
            schema:
              $ref: ./schemas.yaml#/$defs/SessionResponse
      "401":
        description: 会话未知、撤销、空闲过期、绝对过期或用户已禁用，错误码为 session_invalid。
        content:
          application/json:
            schema:
              $ref: ../../shared/error.yaml#/$defs/ErrorResponse
/auth/logout:
  post:
    operationId: logoutAdmin
    summary: 撤销当前管理会话
    parameters:
      - *sessionCookie
      - name: Origin
        in: header
        required: true
        schema: { type: string, format: uri }
      - name: X-CSRF-Token
        in: header
        required: true
        schema: { type: string, minLength: 32 }
    responses:
      "204":
        description: 会话已撤销并清除 cms_session。
        headers:
          Set-Cookie:
            required: true
            schema: { type: string }
            description: 使用同 Path 和安全属性清除 cms_session。
      "401":
        description: 会话无效，错误码为 session_invalid。
        content:
          application/json:
            schema:
              $ref: ../../shared/error.yaml#/$defs/ErrorResponse
      "403":
        description: Origin 或 CSRF 校验失败。
        content:
          application/json:
            schema:
              $ref: ../../shared/error.yaml#/$defs/ErrorResponse
