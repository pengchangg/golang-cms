/auth/captcha/challenges:
  post:
    operationId: createAdminCaptchaChallenge
    summary: 创建滑动拼图挑战
    security: []
    description: 必须通过同源 Origin 校验；建立会话前不要求 CSRF Token。
    parameters:
      - &origin
        name: Origin
        in: header
        required: true
        schema: { type: string, format: uri }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ./schemas.yaml#/$defs/CreateCaptchaChallengeRequest
    responses:
      "201":
        description: 滑动拼图挑战已创建。
        headers:
          Set-Cookie:
            required: true
            schema: { type: string }
            description: cms_captcha_binding；HttpOnly、Secure、SameSite=Strict、Path=/api/admin/v1/auth，无 Domain。
        content:
          application/json:
            schema:
              $ref: ./schemas.yaml#/$defs/CaptchaChallengeResponse
      "400": &validationFailed
        description: 请求体格式或字段校验失败。
        content:
          application/json:
            schema:
              $ref: ../identity/schemas.yaml#/$defs/ValidationErrorResponse
      "403": &originRejected
        description: Origin 缺失或不匹配。
        content:
          application/json:
            schema:
              $ref: ../../shared/error.yaml#/$defs/ErrorResponse
      "429": &rateLimited
        description: 请求过于频繁。
        content:
          application/json:
            schema:
              $ref: ../../shared/error.yaml#/$defs/ErrorResponse
/auth/sms/challenges:
  post:
    operationId: createAdminSMSChallenge
    summary: 创建短信验证码挑战
    security: []
    description: 必须通过同源 Origin 校验，并携带创建滑动拼图挑战时设置的浏览器绑定 Cookie。
    parameters:
      - *origin
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ./schemas.yaml#/$defs/CreateSMSChallengeRequest
    responses:
      "201":
        description: 短信验证码挑战已创建并发送验证码。
        content:
          application/json:
            schema:
              $ref: ./schemas.yaml#/$defs/SMSChallengeResponse
      "400": *validationFailed
      "401": &challengeRejected
        description: 滑动拼图挑战无效或已过期。
        content:
          application/json:
            schema:
              $ref: ../../shared/error.yaml#/$defs/ErrorResponse
      "403": *originRejected
      "429": *rateLimited
      "503":
        description: 短信服务暂时不可用。
        content:
          application/json:
            schema:
              $ref: ../../shared/error.yaml#/$defs/ErrorResponse
/auth/sms/challenges/{challenge_id}/verify:
  parameters:
    - name: challenge_id
      in: path
      required: true
      schema: { type: string, minLength: 1 }
  post:
    operationId: verifyAdminSMSChallenge
    summary: 校验短信验证码并建立管理会话
    security: []
    description: 必须通过同源 Origin 校验，并携带短信挑战绑定的浏览器 Cookie。
    parameters:
      - *origin
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ./schemas.yaml#/$defs/VerifySMSChallengeRequest
    responses:
      "200":
        description: 验证成功并建立会话。
        headers:
          Set-Cookie:
            required: true
            schema: { type: string }
            description: cms_session；HttpOnly、Secure、SameSite=Lax、Path=/api/admin/v1，无 Domain。
        content:
          application/json:
            schema:
              $ref: ./schemas.yaml#/$defs/SessionResponse
      "400": *validationFailed
      "401":
        description: 手机号或验证码无效，错误码固定为 invalid_credentials。
        content:
          application/json:
            schema:
              $ref: ../../shared/error.yaml#/$defs/ErrorResponse
      "403": *originRejected
      "429": *rateLimited
/auth/local/login:
  post:
    operationId: loginAdminLocally
    summary: 本地应急管理员登录
    security: []
    description: 必须通过同源 Origin 校验；建立会话前不要求 CSRF Token。
    parameters:
      - *origin
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ./schemas.yaml#/$defs/LocalLoginRequest
    responses:
      "200":
        description: 登录成功并建立会话。
        headers:
          Set-Cookie:
            required: true
            schema: { type: string }
            description: cms_session；HttpOnly、Secure、SameSite=Lax、Path=/api/admin/v1，无 Domain。
        content:
          application/json:
            schema:
              $ref: ./schemas.yaml#/$defs/SessionResponse
      "400":
        description: 请求体格式或字段校验失败。
        content:
          application/json:
            schema:
              $ref: ../identity/schemas.yaml#/$defs/ValidationErrorResponse
      "401":
        description: 用户名或密码无效，错误码固定为 invalid_credentials。
        content:
          application/json:
            schema:
              $ref: ../../shared/error.yaml#/$defs/ErrorResponse
      "403":
        description: Origin 缺失、不匹配或应急网页登录已关闭。
        content:
          application/json:
            schema:
              $ref: ../../shared/error.yaml#/$defs/ErrorResponse
/auth/session:
  get:
    operationId: getAdminSession
    summary: 获取当前管理会话
    parameters:
      - &sessionCookie
        name: cms_session
        in: cookie
        required: true
        schema: { type: string, minLength: 1 }
        description: HttpOnly 管理会话 Cookie；前端不得读取或自行构造。
    responses:
      "200":
        description: 当前会话、Principal 和 CSRF Token。
        content:
          application/json:
            schema:
              $ref: ./schemas.yaml#/$defs/SessionResponse
      "401":
        description: 会话未知、撤销、空闲过期、绝对过期或用户已禁用，错误码为 session_invalid。
        content:
          application/json:
            schema:
              $ref: ../../shared/error.yaml#/$defs/ErrorResponse
/auth/logout:
  post:
    operationId: logoutAdmin
    summary: 撤销当前管理会话
    parameters:
      - *sessionCookie
      - name: Origin
        in: header
        required: true
        schema: { type: string, format: uri }
      - name: X-CSRF-Token
        in: header
        required: true
        schema: { type: string, minLength: 32 }
    responses:
      "204":
        description: 会话已撤销并清除 cms_session。
        headers:
          Set-Cookie:
            required: true
            schema: { type: string }
            description: 使用同 Path 和安全属性清除 cms_session。
      "401":
        description: 会话无效，错误码为 session_invalid。
        content:
          application/json:
            schema:
              $ref: ../../shared/error.yaml#/$defs/ErrorResponse
      "403":
        description: Origin 或 CSRF 校验失败。
        content:
          application/json:
            schema:
              $ref: ../../shared/error.yaml#/$defs/ErrorResponse
