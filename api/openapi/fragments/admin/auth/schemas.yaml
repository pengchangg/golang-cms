$schema: https://json-schema.org/draft/2020-12/schema
$id: https://internal-cms.invalid/schemas/admin/auth/schemas.yaml
$defs:
  CreateCaptchaChallengeRequest:
    type: object
    additionalProperties: false
    maxProperties: 0
  CaptchaChallengeResponse:
    type: object
    additionalProperties: false
    required: [challenge_id, background_image, tile_image, tile_x, tile_y, expires_at]
    properties:
      challenge_id: { type: string, minLength: 1 }
      background_image: { type: string, minLength: 1 }
      tile_image: { type: string, minLength: 1 }
      tile_x: { type: integer, minimum: 0 }
      tile_y: { type: integer, minimum: 0 }
      expires_at: { type: string, format: date-time }
  CreateSMSChallengeRequest:
    type: object
    additionalProperties: false
    required: [phone, captcha_challenge_id, captcha_x, captcha_y]
    properties:
      phone:
        $ref: ../identity/schemas.yaml#/$defs/PhoneInput
      captcha_challenge_id: { type: string, minLength: 1 }
      captcha_x: { type: integer, minimum: 0 }
      captcha_y: { type: integer, minimum: 0 }
  SMSChallengeResponse:
    type: object
    additionalProperties: false
    required: [challenge_id, phone_masked, expires_at, retry_after_seconds]
    properties:
      challenge_id: { type: string, minLength: 1 }
      phone_masked:
        $ref: ../identity/schemas.yaml#/$defs/PhoneMasked
      expires_at: { type: string, format: date-time }
      retry_after_seconds: { type: integer, minimum: 0 }
  VerifySMSChallengeRequest:
    type: object
    additionalProperties: false
    required: [code]
    properties:
      code:
        type: string
        pattern: "^[0-9]{6}$"
        writeOnly: true
  LocalLoginRequest:
    type: object
    additionalProperties: false
    required: [username, password]
    properties:
      username:
        type: string
        minLength: 1
        maxLength: 128
      password:
        type: string
        minLength: 1
        maxLength: 1024
        writeOnly: true
  SessionResponse:
    type: object
    additionalProperties: false
    required: [principal, content_models, csrf_token, idle_expires_at, expires_at]
    properties:
      principal:
        $ref: ../identity/schemas.yaml#/$defs/Principal
      content_models:
        type: array
        description: 当前主体具有至少一项有效模型权限且仍处于活动状态的模型摘要。
        items:
          $ref: "#/$defs/SessionModelSummary"
      csrf_token:
        type: string
        minLength: 32
        description: 当前会话写请求使用的 X-CSRF-Token；调用方不得持久化。
      idle_expires_at:
        type: string
        format: date-time
        description: 当前空闲过期时间，成功访问已认证 API 后可刷新，但不晚于 expires_at。
      expires_at:
        type: string
        format: date-time
        description: 会话创建后 12 小时的绝对过期时间，不可延长。
  SessionModelSummary:
    type: object
    additionalProperties: false
    required: [id, key, display_name]
    properties:
      id: { type: string, minLength: 1 }
      key: { type: string, pattern: "^[a-z][a-z0-9_]{0,63}$" }
      display_name: { type: string, minLength: 1, maxLength: 120 }
