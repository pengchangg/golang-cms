x-integration-status: integrated
/assets:
  get:
    x-integration-status: integrated
    operationId: listAdminAssets
    summary: 列出素材元数据
    parameters:
      - &sessionCookie
        name: cms_session
        in: cookie
        required: true
        schema: { type: string, minLength: 1 }
      - name: status
        in: query
        schema:
          $ref: ./schemas.yaml#/$defs/AssetStatus
      - name: mime_type
        in: query
        schema: { type: string, minLength: 1, maxLength: 255 }
      - &limit
        name: limit
        in: query
        schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      - &cursor
        name: cursor
        in: query
        schema: { type: string, minLength: 1 }
    responses:
      "200":
        description: 按 created_at DESC、id DESC 返回素材。
        content:
          application/json:
            schema:
              $ref: ./schemas.yaml#/$defs/AssetListResponse
      "400": &badRequest
        description: 请求校验、查询或游标无效。
        content:
          application/json:
            schema:
              $ref: ../../shared/error.yaml#/$defs/ErrorResponse
      "401": &unauthenticated
        description: 管理会话无效。
        content:
          application/json:
            schema:
              $ref: ../../shared/error.yaml#/$defs/ErrorResponse
      "403": &forbidden
        description: 权限不足。
        content:
          application/json:
            schema:
              $ref: ../../shared/error.yaml#/$defs/ErrorResponse
/assets/uploads:
  post:
    x-integration-status: integrated
    operationId: createAdminAssetUpload
    summary: 创建隔离素材和对象存储签名上传
    parameters: &writeHeaders
      - *sessionCookie
      - name: Origin
        in: header
        required: true
        schema: { type: string, format: uri }
      - name: X-CSRF-Token
        in: header
        required: true
        schema: { type: string, minLength: 32 }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ./schemas.yaml#/$defs/CreateAssetUploadRequest
    responses:
      "201":
        description: 已创建 quarantined 素材并签发短时 PUT 请求。
        headers:
          Cache-Control:
            schema: { const: no-store }
        content:
          application/json:
            schema:
              $ref: ./schemas.yaml#/$defs/AssetUpload
      "400": *badRequest
      "401": *unauthenticated
      "403": *forbidden
      "413":
        description: 文件超过允许大小，error.code 为 file_too_large。
        content:
          application/json:
            schema:
              $ref: ../../shared/error.yaml#/$defs/ErrorResponse
      "503": &storeUnavailable
        description: 对象存储临时不可用，error.code 为 object_store_unavailable。
        content:
          application/json:
            schema:
              $ref: ../../shared/error.yaml#/$defs/ErrorResponse
/assets/{asset_id}:
  parameters: &assetId
    - name: asset_id
      in: path
      required: true
      schema: { type: string, minLength: 1 }
  get:
    x-integration-status: integrated
    operationId: getAdminAsset
    summary: 获取素材元数据
    parameters: [*sessionCookie]
    responses:
      "200": &assetResponse
        description: 素材元数据，不包含对象 Key 或签名 URL。
        content:
          application/json:
            schema:
              $ref: ./schemas.yaml#/$defs/Asset
      "401": *unauthenticated
      "403": *forbidden
      "404": &notFound
        description: 素材不存在。
        content:
          application/json:
            schema:
              $ref: ../../shared/error.yaml#/$defs/ErrorResponse
  patch:
    x-integration-status: integrated
    operationId: updateAdminAsset
    summary: 修改素材显示文件名
    parameters: *writeHeaders
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ./schemas.yaml#/$defs/UpdateAssetRequest
    responses:
      "200": *assetResponse
      "400": *badRequest
      "401": *unauthenticated
      "403": *forbidden
      "404": *notFound
      "409": &assetConflict
        description: 素材状态、上传或对象元数据冲突。
        content:
          application/json:
            schema:
              $ref: ../../shared/error.yaml#/$defs/ErrorResponse
  delete:
    x-integration-status: integrated
    operationId: archiveAdminAsset
    summary: 归档素材但保留对象和历史引用
    parameters: *writeHeaders
    responses:
      "204": { description: 素材已归档。 }
      "401": *unauthenticated
      "403": *forbidden
      "404": *notFound
      "409": *assetConflict
/assets/{asset_id}/confirm:
  parameters: *assetId
  post:
    x-integration-status: integrated
    operationId: confirmAdminAssetUpload
    summary: 核对 S3 用户 Metadata 并使素材可用
    parameters: *writeHeaders
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ./schemas.yaml#/$defs/ConfirmAssetUploadRequest
    responses:
      "200": *assetResponse
      "400": *badRequest
      "401": *unauthenticated
      "403": *forbidden
      "404": *notFound
      "409": *assetConflict
      "413":
        description: 历史素材超过 100 MiB 同步确认上限，error.code 为 asset_confirmation_too_large。
        content:
          application/json:
            schema:
              $ref: ../../shared/error.yaml#/$defs/ErrorResponse
      "429":
        description: 全进程或当前用户素材确认并发数已达上限，error.code 为 asset_confirm_concurrency_limit。
        content:
          application/json:
            schema:
              $ref: ../../shared/error.yaml#/$defs/ErrorResponse
      "503": *storeUnavailable
/assets/{asset_id}/download:
  parameters: *assetId
  get:
    x-integration-status: integrated
    operationId: downloadAdminAsset
    summary: 为可下载素材签发短时对象存储地址
    parameters: [*sessionCookie]
    responses:
      "302":
        description: 重定向到短时私有对象存储下载地址。
        headers:
          Location:
            required: true
            schema: { type: string, format: uri }
          Cache-Control:
            required: true
            schema: { const: "private, no-store" }
      "401": *unauthenticated
      "403": *forbidden
      "404": *notFound
      "409": *assetConflict
      "503": *storeUnavailable
/assets/{asset_id}/preview:
  parameters: *assetId
  get:
    x-integration-status: integrated
    operationId: previewAdminAsset
    summary: 预览可用或已归档素材
    parameters:
      - *sessionCookie
      - &ifNoneMatch
        name: If-None-Match
        in: header
        schema: { type: string, minLength: 1 }
    responses:
      "200": &inlinePreview
        description: 可预览素材由应用同源流式返回；文本类最大 1 MiB。
        headers: &previewCacheHeaders
          ETag:
            required: true
            schema: { type: string, minLength: 1 }
          Cache-Control:
            required: true
            schema: { const: "private, no-cache" }
          Content-Disposition:
            schema: { const: inline }
          X-Content-Type-Options:
            schema: { const: nosniff }
        content:
          text/plain: { schema: { type: string } }
          text/csv: { schema: { type: string } }
          application/json: { schema: {} }
          image/jpeg: { schema: { type: string, contentEncoding: binary } }
          image/png: { schema: { type: string, contentEncoding: binary } }
          image/webp: { schema: { type: string, contentEncoding: binary } }
          image/gif: { schema: { type: string, contentEncoding: binary } }
          image/avif: { schema: { type: string, contentEncoding: binary } }
          image/svg+xml: { schema: { type: string, contentEncoding: binary } }
          application/pdf: { schema: { type: string, contentEncoding: binary } }
          video/mp4: { schema: { type: string, contentEncoding: binary } }
          video/webm: { schema: { type: string, contentEncoding: binary } }
          audio/mpeg: { schema: { type: string, contentEncoding: binary } }
          audio/mp4: { schema: { type: string, contentEncoding: binary } }
          audio/ogg: { schema: { type: string, contentEncoding: binary } }
          audio/wav: { schema: { type: string, contentEncoding: binary } }
          audio/webm: { schema: { type: string, contentEncoding: binary } }
      "304": &previewNotModified
        description: 当前会话仍有预览权限且 If-None-Match 与素材 SHA-256 ETag 匹配，无响应体且不读取对象存储正文。
        headers:
          ETag:
            required: true
            schema: { type: string, minLength: 1 }
          Cache-Control:
            required: true
            schema: { const: "private, no-cache" }
      "401": *unauthenticated
      "403": *forbidden
      "404": *notFound
      "409": *assetConflict
      "413": &previewTooLarge
        description: 文本素材超过 1 MiB，error.code 为 asset_preview_too_large。
        content:
          application/json:
            schema:
              $ref: ../../shared/error.yaml#/$defs/ErrorResponse
      "503": *storeUnavailable
/models/{model_id}/entries/{entry_id}/assets/{asset_id}/preview:
  parameters: &referencedAssetId
    - name: model_id
      in: path
      required: true
      schema: { type: string, minLength: 1 }
    - name: entry_id
      in: path
      required: true
      schema: { type: string, minLength: 1 }
    - name: asset_id
      in: path
      required: true
      schema: { type: string, minLength: 1 }
  get:
    x-integration-status: integrated
    operationId: previewAdminReferencedAsset
    summary: 预览当前草稿引用的素材
    parameters: [*sessionCookie, *ifNoneMatch]
    responses:
      "200": *inlinePreview
      "304": *previewNotModified
      "401": *unauthenticated
      "403": *forbidden
      "404": *notFound
      "409": *assetConflict
      "413": *previewTooLarge
      "503": *storeUnavailable
/models/{model_id}/entries/{entry_id}/assets/{asset_id}/download:
  parameters: *referencedAssetId
  get:
    x-integration-status: integrated
    operationId: downloadAdminReferencedAsset
    summary: 下载当前草稿引用的素材
    parameters: [*sessionCookie]
    responses:
      "302":
        description: 重定向到带安全 attachment 文件名的短时下载地址。
        headers:
          Location:
            required: true
            schema: { type: string, format: uri }
          Cache-Control:
            required: true
            schema: { const: "private, no-store" }
      "401": *unauthenticated
      "403": *forbidden
      "404": *notFound
      "503": *storeUnavailable
