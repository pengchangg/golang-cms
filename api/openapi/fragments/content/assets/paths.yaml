x-integration-status: integrated
/assets/{asset_id}:
  parameters:
    - name: asset_id
      in: path
      required: true
      schema: { type: string, minLength: 1 }
  get:
    x-integration-status: integrated
    operationId: downloadPublishedAsset
    summary: 下载 API Key 授权发布内容或配置引用的素材
    description: asset_id 可取自发布条目或展开条目的 referenced_assets 键，也可取自 content 内媒体字段及富文本 image、audio、video 节点的 attrs.asset_id；仅当前授权发布 Revision 实际引用的素材可下载。
    parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
          pattern: "^Bearer cmsk_[a-z2-7]{12}_[A-Za-z0-9_-]{43}$"
    responses:
      "302":
        description: 重定向到短时私有对象存储下载地址。
        headers:
          Location:
            required: true
            schema: { type: string, format: uri }
          Cache-Control:
            required: true
            schema: { const: "private, no-store" }
          X-Request-ID:
            required: true
            schema: { type: string, minLength: 1 }
      "401":
        description: 缺少、无效、过期或已撤销的 API Key。
        content:
          application/json:
            schema:
              $ref: ../../shared/error.yaml#/$defs/ErrorResponse
      "404":
        description: 素材不存在，或没有 API Key 模型范围/配置命名空间范围内的当前发布引用；error.code 为 published_asset_not_found。
        content:
          application/json:
            schema:
              $ref: ../../shared/error.yaml#/$defs/ErrorResponse
      "429":
        description: API Key 或 Key/IP 组合超过频率或并发额度，error.code 为 content_rate_limited 或 content_concurrency_limited。
        headers:
          Retry-After:
            required: true
            schema: { type: integer, minimum: 1 }
        content:
          application/json:
            schema:
              $ref: ../../shared/error.yaml#/$defs/ErrorResponse
      "503":
        description: 内容 API 全进程并发已达上限或对象存储临时不可用，error.code 为 content_api_busy 或 object_store_unavailable。
        headers:
          Retry-After:
            description: 仅 content_api_busy 时提供。
            schema: { type: integer, minimum: 1 }
        content:
          application/json:
            schema:
              $ref: ../../shared/error.yaml#/$defs/ErrorResponse
