$schema: https://json-schema.org/draft/2020-12/schema
$id: https://internal-cms.invalid/schemas/shared/rich-text.yaml
$defs:
  RichTextDocument:
    type: string
    maxLength: 524288
    description: |
      服务端清洗后的 HTML 正文。允许标题、段落、列表、引用、代码、链接、基础表格与加粗/斜体/下划线/删除线等行内格式。
      媒体仅允许带 data-asset-id 的 img/audio/video：图片还须有 alt（可为空）以及可选 width/height；音视频可有 controls。
      持久化与 Admin 草稿响应中，媒体只有 data-asset-id（及 img 的 alt/width/height 等），不得包含 script、事件处理器、style、以及临时 blob/data/外链 src。
      Content API 已发布响应可为内部素材附加 src，值为对应 referenced_assets[].object_key（不是可直接访问的 URL），并保留 data-asset-id。
